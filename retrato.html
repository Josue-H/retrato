const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 520, H = 520;
const CX = W/2, CY = H/2;

let assembled = false, frame = 0;
let mouseX = CX, mouseY = CY;
let targetMX = CX, targetMY = CY;
let isHovering = false;

// Normalizar luminancia
const lums = RAW.map(p => p[5]);
const lMin = Math.min(...lums), lMax = Math.max(...lums);
const lRange = lMax - lMin || 1;

// Construir partículas con depth para parallax
const P = RAW.map(([tx, ty, r, g, b, lum]) => {
  const t = (lum - lMin) / lRange;
  const sz = 0.9 + t * 2.2;
  const angle = Math.random() * Math.PI * 2;
  const dist = 480 + Math.random() * 380;

  // Tinte cálido rosado
  const wr = Math.min(255, Math.round(r * 0.82 + 52));
  const wg = Math.min(255, Math.round(g * 0.72 + 12));
  const wb = Math.min(255, Math.round(b * 0.68 + 18));

  // depth 0=fondo, 1=frente (para parallax diferencial)
  const depth = 0.3 + Math.random() * 0.7;

  return {
    x: tx + Math.cos(angle) * dist,
    y: ty + Math.sin(angle) * dist,
    tx, ty, vx: 0, vy: 0,
    r: wr, g: wg, b: wb, lum, t,
    sz, depth,
    alpha: 0.55 + t * 0.40,
    spd: 0.038 + Math.random() * 0.036,
    delay: Math.floor(Math.random() * 65),
    // para estela de mouse
    lit: 0,
  };
});

// Cursor personalizado
const dot = document.getElementById('dot');
document.addEventListener('mousemove', e => {
  dot.style.left = e.clientX + 'px';
  dot.style.top  = e.clientY + 'px';
  const rect = canvas.getBoundingClientRect();
  targetMX = (e.clientX - rect.left) * (W / rect.width);
  targetMY = (e.clientY - rect.top)  * (H / rect.height);
  isHovering = true;
});
document.addEventListener('mouseleave', () => { isHovering = false; });
document.addEventListener('touchmove', e => {
  e.preventDefault();
  const touch = e.touches[0];
  const rect = canvas.getBoundingClientRect();
  targetMX = (touch.clientX - rect.left) * (W / rect.width);
  targetMY = (touch.clientY - rect.top)  * (H / rect.height);
  isHovering = true;
}, { passive: false });
document.addEventListener('touchend', () => { isHovering = false; });

function draw() {
  // Suavizado del mouse (lerp)
  mouseX += (targetMX - mouseX) * 0.07;
  mouseY += (targetMY - mouseY) * 0.07;

  // Offset de parallax: cuánto se desplaza el centro del retrato según el cursor
  const PARALLAX_STRENGTH = 7;
  const pOffX = assembled ? ((mouseX - CX) / CX) * PARALLAX_STRENGTH : 0;
  const pOffY = assembled ? ((mouseY - CY) / CY) * PARALLAX_STRENGTH : 0;

  ctx.fillStyle = 'rgba(6,3,10,0.22)';
  ctx.fillRect(0, 0, W, H);

  let done = true;

  for (let i = 0; i < P.length; i++) {
    const p = P[i];

    // Fase de espera: parpadeo en origen
    if (frame < p.delay) {
      done = false;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.sz * 0.3, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${p.r},${p.g},${p.b},0.07)`;
      ctx.fill();
      continue;
    }

    if (!assembled) {
      // ── Vuelo hacia destino ──
      const dx = p.tx - p.x, dy = p.ty - p.y;
      const d = Math.sqrt(dx*dx + dy*dy);
      if (d > 0.5) {
        done = false;
        p.vx = (p.vx + dx * p.spd) * 0.72;
        p.vy = (p.vy + dy * p.spd) * 0.72;
        p.x += p.vx; p.y += p.vy;
      }
      const speed = Math.sqrt(p.vx*p.vx + p.vy*p.vy);
      const glow  = Math.min(1, speed * 0.14);
      const sz    = p.sz * (1 + glow * 0.7);
      const alpha = Math.min(0.98, p.alpha + glow * 0.4);

      ctx.beginPath();
      ctx.arc(p.x, p.y, sz, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${p.r},${p.g},${p.b},${alpha.toFixed(2)})`;
      ctx.fill();

      // Estela de vuelo
      if (glow > 0.05) {
        ctx.beginPath();
        ctx.arc(p.x, p.y, sz * 2.8, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${p.r},${p.g},${p.b},${(glow * 0.07).toFixed(2)})`;
        ctx.fill();
      }

    } else {
      // ── Posición final con parallax + efecto de cursor ──

      // Parallax diferencial por profundidad
      const px = p.tx + pOffX * p.depth;
      const py = p.ty + pOffY * p.depth;

      // Efecto de luz: distancia del cursor a esta partícula
      const cdx = mouseX - px;
      const cdy = mouseY - py;
      const cdist = Math.sqrt(cdx*cdx + cdy*cdy);
      const TOUCH_R = 85;
      const cursorGlow = isHovering ? Math.max(0, 1 - cdist / TOUCH_R) : 0;

      // "Empuje" suave: las partículas cerca del cursor se alejan levemente
      let pushX = px, pushY = py;
      if (cursorGlow > 0) {
        const pushStr = cursorGlow * 5;
        const ang = Math.atan2(cdy, cdx);
        pushX = px - Math.cos(ang) * pushStr * (1 - p.depth * 0.4);
        pushY = py - Math.sin(ang) * pushStr * (1 - p.depth * 0.4);
      }

      // Respiración suave (pulso)
      const pulse = Math.sin(frame * 0.018 + i * 0.14) * 0.15;
      const heartbeat = Math.sin(frame * 0.045) * 0.04; // latido más lento global

      const alpha = Math.min(0.98, p.alpha
        + pulse * 0.10
        + cursorGlow * 0.35      // iluminación por cursor
        + heartbeat * 0.06);
      const sz = p.sz * (1 + pulse * 0.06 + cursorGlow * 0.45 + heartbeat * 0.04);

      ctx.beginPath();
      ctx.arc(pushX, pushY, sz, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${p.r},${p.g},${p.b},${alpha.toFixed(2)})`;
      ctx.fill();

      // Halo suave cuando el cursor está cerca
      if (cursorGlow > 0.1) {
        ctx.beginPath();
        ctx.arc(pushX, pushY, sz * 2.5, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${p.r},${p.g},${p.b},${(cursorGlow * 0.09).toFixed(2)})`;
        ctx.fill();
      }
    }
  }

  frame++;
  if (!assembled && done && frame > 85) {
    assembled = true;
    document.getElementById('msg').style.color = 'rgba(255,190,170,0.90)';
    setTimeout(() => document.getElementById('hint').style.color = 'rgba(255,170,150,0.35)', 1800);
  }

  requestAnimationFrame(draw);
}

canvas.addEventListener('click', () => {
  if (!assembled) return;
  assembled = false; frame = 0;
  P.forEach(p => {
    const a = Math.random() * Math.PI * 2;
    const s = 10 + Math.random() * 10;
    p.vx = Math.cos(a) * s; p.vy = Math.sin(a) * s;
    p.x = p.tx; p.y = p.ty;
    p.delay = Math.floor(Math.random() * 10);
  });
  document.getElementById('msg').style.color = 'rgba(255,190,170,0)';
  document.getElementById('hint').style.color = 'rgba(255,170,150,0)';
});

requestAnimationFrame(draw);
</script>
</body>
</html>
